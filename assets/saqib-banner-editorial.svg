<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360" role="img" aria-label="Saqib Ali editorial engineering banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060B14"/>
      <stop offset="55%" stop-color="#0A1422"/>
      <stop offset="100%" stop-color="#101D33"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34F5FF"/>
      <stop offset="50%" stop-color="#4B9FFF"/>
      <stop offset="100%" stop-color="#8B6DFF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .ticker { animation: ticker 18s linear infinite; }
      .slideA { animation: slideA 6s ease-in-out infinite alternate; }
      .float { animation: float 4.5s ease-in-out infinite; }
      .flash { animation: flash 2.8s ease-in-out infinite; }
      @keyframes ticker { from { transform: translateX(0px); } to { transform: translateX(-220px); } }
      @keyframes slideA { from { transform: translateX(-25px); opacity:.35; } to { transform: translateX(25px); opacity:.55; } }
      @keyframes float { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-8px)} }
      @keyframes flash { 0%,100%{opacity:.75} 50%{opacity:1} }
      @media (prefers-reduced-motion: reduce){ .ticker,.slideA,.float,.flash{ animation:none!important; } }
    </style>
  </defs>
  <rect width="1400" height="360" rx="28" fill="url(#bg)"/>
  <rect x="0" y="0" width="1400" height="360" rx="28" fill="none" stroke="#1D3957" stroke-width="2"/>

  <polygon points="0,0 500,0 290,360 0,360" fill="#0E2638" opacity=".9"/>
  <polygon class="slideA" points="150,0 360,0 190,360 -20,360" fill="url(#stripe)" opacity=".12"/>

  <text x="74" y="84" font-family="Courier New, monospace" font-size="16" font-weight="700" fill="#39F6FF">/ SAQIB ALI / SOFTWARE ENGINEER</text>

  <text x="72" y="165" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#F7FAFF">BUILD</text>
  <text x="72" y="230" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#F7FAFF">SYSTEMS</text>
  <text x="72" y="288" font-family="Arial, sans-serif" font-size="46" font-weight="900" fill="#39F6FF">THAT SHIP.</text>

  <text x="78" y="326" font-family="Courier New, monospace" font-size="16" font-weight="700" fill="#B9C7D8">backend-first · product-minded · cloud-aware</text>

  <g transform="translate(630,58)">
    <rect x="0" y="0" width="680" height="228" rx="30" fill="#0A1524" stroke="#244460" stroke-width="2"/>
    <line x1="34" y1="48" x2="646" y2="48" stroke="#193247" stroke-width="1"/>
    <circle cx="35" cy="24" r="6" fill="#FF6B6B"/>
    <circle cx="57" cy="24" r="6" fill="#FFD76A"/>
    <circle cx="79" cy="24" r="6" fill="#46E3A4"/>

    <text x="34" y="88" font-family="Courier New, monospace" font-size="18" font-weight="700" fill="#39F6FF">$ profile.mode</text>
    <text x="34" y="118" font-family="Courier New, monospace" font-size="22" font-weight="700" fill="#F7FAFF">real products &gt; random screens</text>

    <text x="34" y="160" font-family="Courier New, monospace" font-size="18" font-weight="700" fill="#39F6FF">$ current.stack</text>
    <text x="34" y="190" font-family="Courier New, monospace" font-size="20" font-weight="700" fill="#F7FAFF">.NET 8 · PostgreSQL · Azure · React Native</text>

    <g class="float" transform="translate(500,105)">
      <rect x="0" y="0" width="118" height="42" rx="16" fill="#12263D" stroke="#39F6FF" stroke-width="1.6"/>
      <text x="59" y="27" text-anchor="middle" font-family="Courier New, monospace" font-size="15" font-weight="700" fill="#F7FAFF">SaaS</text>
    </g>
    <g class="float" transform="translate(450,162)">
      <rect x="0" y="0" width="168" height="42" rx="16" fill="#12263D" stroke="#4B9FFF" stroke-width="1.6"/>
      <text x="84" y="27" text-anchor="middle" font-family="Courier New, monospace" font-size="15" font-weight="700" fill="#F7FAFF">APIs + Cloud</text>
    </g>
    <g class="flash" transform="translate(565,50)" filter="url(#glow)">
      <circle cx="0" cy="0" r="9" fill="#39F6FF"/>
    </g>
  </g>

  <g transform="translate(0,334)">
    <rect x="0" y="0" width="1400" height="26" fill="#07111E"/>
    <g class="ticker">
      <text x="30" y="18" font-family="Courier New, monospace" font-size="15" font-weight="700" fill="#E8F0FF">BitMT experience · DialGuru · Legal Assist · Cargo Connect · backend / product / cloud engineering · BitMT experience · DialGuru · Legal Assist · Cargo Connect · backend / product / cloud engineering ·</text>
    </g>
  </g>
</svg>